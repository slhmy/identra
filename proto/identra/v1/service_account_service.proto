syntax = "proto3";

package identra.v1;

import "google/protobuf/timestamp.proto";
import "identra/v1/types.proto";

option go_package = "github.com/slhmy/identra/gen/go/identra/v1;identra_v1_pb";

// ServiceAccountService issues service tokens and manages machine identities.
// Management methods require authorization: Bearer <service token> metadata.
service ServiceAccountService {
  rpc ExchangeServiceToken(ExchangeServiceTokenRequest) returns (ExchangeServiceTokenResponse);
  rpc CreateServiceAccount(CreateServiceAccountRequest) returns (CreateServiceAccountResponse);
  rpc ListServiceAccounts(ListServiceAccountsRequest) returns (ListServiceAccountsResponse);
  rpc DisableServiceAccount(DisableServiceAccountRequest) returns (DisableServiceAccountResponse);
  rpc RotateServiceAccountSecret(RotateServiceAccountSecretRequest) returns (RotateServiceAccountSecretResponse);
}

message ServiceAccount {
  string client_id = 1;
  string name = 2;
  repeated string scopes = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp disabled_at = 5;
}

message ServiceAccountCredential {
  string client_id = 1;
  string client_secret = 2;
}

message ExchangeServiceTokenRequest {
  string client_id = 1;
  string client_secret = 2;
}

message ExchangeServiceTokenResponse {
  Token token = 1;
}

message CreateServiceAccountRequest {
  string name = 1;
  repeated string scopes = 2;
}

message CreateServiceAccountResponse {
  ServiceAccount service_account = 1;
  ServiceAccountCredential credential = 2;
}

message ListServiceAccountsRequest {}

message ListServiceAccountsResponse {
  repeated ServiceAccount service_accounts = 1;
}

message DisableServiceAccountRequest {
  string client_id = 1;
}

message DisableServiceAccountResponse {
  ServiceAccount service_account = 1;
}

message RotateServiceAccountSecretRequest {
  string client_id = 1;
}

message RotateServiceAccountSecretResponse {
  ServiceAccountCredential credential = 1;
}
