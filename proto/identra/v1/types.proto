syntax = "proto3";

package identra.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/slhmy/identra/gen/go/identra/v1;identra_v1_pb";

// Token is a signed bearer token and its expiration time.
message Token {
  string value = 1;
  google.protobuf.Timestamp expires_at = 2;
}

// TokenPair contains the credentials issued for an authenticated session.
message TokenPair {
  Token access_token = 1;
  Token refresh_token = 2;
}

enum AuthProvider {
  AUTH_PROVIDER_UNSPECIFIED = 0;
  AUTH_PROVIDER_GITHUB = 1;
}

enum AuthProviderUnavailableReason {
  AUTH_PROVIDER_UNAVAILABLE_REASON_UNSPECIFIED = 0;
  AUTH_PROVIDER_UNAVAILABLE_REASON_MISSING_CLIENT_ID = 1;
  AUTH_PROVIDER_UNAVAILABLE_REASON_MISSING_CLIENT_SECRET = 2;
}

message AuthProviderStatus {
  AuthProvider provider = 1;
  bool enabled = 2;
  AuthProviderUnavailableReason unavailable_reason = 3;
}

message OAuthUserProfile {
  string username = 1;
  string avatar_url = 2;
  string email = 3;
}

message LinkedOAuthAccount {
  AuthProvider provider = 1;
  string provider_user_id = 2;
}

message User {
  string id = 1;
  string email = 2;
  bool password_login_enabled = 3;
  repeated LinkedOAuthAccount linked_oauth_accounts = 4;
}

enum SigningAlgorithm {
  SIGNING_ALGORITHM_UNSPECIFIED = 0;
  SIGNING_ALGORITHM_RS256 = 1;
}

message RsaPublicKey {
  bytes modulus = 1;
  uint32 exponent = 2;
}

message SigningKey {
  string key_id = 1;
  SigningAlgorithm algorithm = 2;
  oneof public_key {
    RsaPublicKey rsa = 3;
  }
}
