version: "2"
sql:
  - engine: sqlite
    schema: internal/store/sqlite/schema.sql
    queries: internal/store/sqlite/queries.sql
    gen:
      go:
        package: sqlitedb
        out: internal/store/sqlite/sqlitedb
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: true
        overrides:
          - column: users.created_at
            go_type: time.Time
          - column: users.updated_at
            go_type: time.Time
          - column: users.deleted_at
            go_type:
              type: NullTime
              import: database/sql
          - column: users.last_login_at
            go_type:
              type: NullTime
              import: database/sql
          - column: external_identities.created_at
            go_type: time.Time
          - column: external_identities.updated_at
            go_type: time.Time
          - column: external_identities.deleted_at
            go_type:
              type: NullTime
              import: database/sql
          - column: service_accounts.created_at
            go_type: time.Time
          - column: service_accounts.updated_at
            go_type: time.Time
          - column: service_accounts.disabled_at
            go_type:
              type: NullTime
              import: database/sql
          - column: service_account_credentials.created_at
            go_type: time.Time
          - column: service_account_credentials.expires_at
            go_type:
              type: NullTime
              import: database/sql
          - column: service_account_credentials.revoked_at
            go_type:
              type: NullTime
              import: database/sql
          - column: system_state.updated_at
            go_type: time.Time
