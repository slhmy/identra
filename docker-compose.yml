services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mailpit:
    image: axllent/mailpit:v1.30
    ports:
      - "1025:1025"
      - "8025:8025"

  identra-grpc:
    build:
      context: .
      args:
        SERVICE: identra-grpc
    environment:
      GRPC_PORT: "50051"
      REDIS_URLS: redis:6379
      PERSISTENCE_TYPE: sqlite
      PERSISTENCE_SQLITE_PATH: /app/data/users.db
      AUTH_TOKEN_ISSUER: identra
      SMTP_MAILER_HOST: mailpit
      SMTP_MAILER_PORT: "1025"
      SMTP_MAILER_FROM_EMAIL: noreply@identra.local
      SMTP_MAILER_FROM_NAME: Identra Local
      SMTP_MAILER_START_TLS: "false"
      SMTP_MAILER_AUTH_ENABLED: "false"
    ports:
      - "50051:50051"
    volumes:
      - identra-data:/app/data
    depends_on:
      - redis
      - mailpit

  identra-gateway:
    build:
      context: .
      args:
        SERVICE: identra-gateway
    environment:
      HTTP_PORT: "8080"
      GRPC_ENDPOINT: identra-grpc:50051
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:8080
      CORS_ALLOW_CREDENTIALS: "true"
    ports:
      - "8080:8080"
    depends_on:
      - identra-grpc

volumes:
  identra-data:
  redis-data:
