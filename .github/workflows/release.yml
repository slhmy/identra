name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: bufbuild/buf-setup-action@v1
      - name: Install generators
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
      - name: Verify source
        run: |
          go vet ./...
          go test ./...
          IDENTRA_REDIS_URL=localhost:6379 go test ./internal/cache -run 'TestRedis.*Contract' -count=1
          go test ./internal/arch
          buf lint
          buf generate --clean
          sqlc generate
          git diff --exit-code gen internal/store/sqlite/sqlitedb
      - name: Restart and upgrade smoke test
        run: bash scripts/smoke.sh

  binaries:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {goos: linux, goarch: amd64, archive: tar.gz}
          - {goos: linux, goarch: arm64, archive: tar.gz}
          - {goos: darwin, goarch: amd64, archive: tar.gz}
          - {goos: darwin, goarch: arm64, archive: tar.gz}
          - {goos: windows, goarch: amd64, archive: zip}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME#v}"
          package="identra_${version}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${package}"
          output="dist/${package}/identra"
          if [ "$GOOS" = windows ]; then output="${output}.exe"; fi
          go build -trimpath -ldflags "-s -w -X github.com/slhmy/identra/internal/buildinfo.Version=${GITHUB_REF_NAME} -X github.com/slhmy/identra/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/slhmy/identra/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o "$output" ./cmd/identra
          if [ "${{ matrix.archive }}" = zip ]; then
            (cd dist && zip -r "${package}.zip" "${package}")
          else
            tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: identra-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.${{ matrix.archive }}
          if-no-files-found: error

  github-release:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz *.zip > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*

  docker:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
